services:
  backend:
    build: .
    container_name: url-shortener-backend
    ports:
      - "8080:8080"
      - "9090:9090"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=url_shortener
      - DB_USER=${POSTGRES_USER:-urlapp}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-secretpass123}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - METRICS_PORT=9090
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  backend-2:
    build: .
    container_name: url-shortener-backend-2
    ports:
      - "8081:8080"
      - "9091:9090"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=url_shortener
      - DB_USER=${POSTGRES_USER:-urlapp}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-secretpass123}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - METRICS_PORT=9090
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: url-shortener-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=url_shortener
      - POSTGRES_USER=${POSTGRES_USER:-urlapp}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-secretpass123}
    volumes:
      - ./config/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-urlapp} -d url_shortener"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: url-shortener-redis
    ports:
      - "6379:6379"
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: url-shortener-prometheus
    ports:
      - "9092:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - app-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.0
    container_name: url-shortener-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - ./config/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
      - ./config/grafana/dashboards/dashboard.yml:/etc/grafana/provisioning/dashboards/dashboard.yml
      - ./config/grafana/dashboards/url-shortener.json:/var/lib/grafana/dashboards/url-shortener.json
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
